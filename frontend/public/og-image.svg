<svg width="1200" height="630" viewBox="0 0 1200 630" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="1200" height="630" fill="#0f0f13"/>

  <!-- Grid pattern -->
  <defs>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#6366f110" stroke-width="1"/>
    </pattern>
    <radialGradient id="glow1" cx="50%" cy="40%" r="60%">
      <stop offset="0%" stop-color="#6366f1" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glow2" cx="20%" cy="70%" r="40%">
      <stop offset="0%" stop-color="#10b981" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#10b981" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#818cf8"/>
      <stop offset="50%" stop-color="#a5b4fc"/>
      <stop offset="100%" stop-color="#6ee7b7"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#grid)"/>
  <rect width="1200" height="630" fill="url(#glow1)"/>
  <rect width="1200" height="630" fill="url(#glow2)"/>

  <!-- Logo icon -->
  <rect x="100" y="165" width="72" height="72" rx="18" fill="#6366f1"/>
  <rect x="100" y="165" width="72" height="72" rx="18" fill="url(#glow1)" opacity="0.5"/>
  <!-- TrendingUp icon simplified -->
  <polyline points="115,220 134,204 147,214 172,190" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  <polyline points="155,190 172,190 172,207" stroke="white" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>

  <!-- Brand name -->
  <text x="192" y="212" font-family="system-ui, -apple-system, sans-serif" font-size="52" font-weight="800" fill="white">Revendu</text>

  <!-- Tagline -->
  <text x="100" y="295" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="400" fill="#a1a1aa">Tracker de profit pour revendeurs</text>
  <text x="100" y="345" font-family="system-ui, -apple-system, sans-serif" font-size="34" font-weight="400" fill="#a1a1aa">Vinted, Leboncoin &amp; eBay</text>

  <!-- DAC7 highlight -->
  <rect x="100" y="390" width="580" height="66" rx="14" fill="#6366f115"/>
  <rect x="100" y="390" width="580" height="66" rx="14" stroke="#6366f130" stroke-width="1"/>
  <text x="130" y="432" font-family="system-ui, -apple-system, sans-serif" font-size="24" font-weight="600" fill="#a5b4fc">⚡ Alertes seuil DAC7 en temps réel</text>

  <!-- Right side — mock UI card -->
  <rect x="720" y="120" width="380" height="390" rx="20" fill="#18181f"/>
  <rect x="720" y="120" width="380" height="390" rx="20" stroke="#27272f" stroke-width="1"/>

  <!-- Card header -->
  <text x="748" y="165" font-family="system-ui, -apple-system, sans-serif" font-size="14" font-weight="600" fill="#6366f1">Seuils DAC7 — 2024</text>

  <!-- Transactions bar -->
  <text x="748" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#a1a1aa">Transactions</text>
  <text x="1065" y="205" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#f59e0b" text-anchor="end">23 / 30 (77%)</text>
  <rect x="748" y="214" width="324" height="8" rx="4" fill="#27272f"/>
  <rect x="748" y="214" width="249" height="8" rx="4" fill="#f59e0b"/>

  <!-- Revenue bar -->
  <text x="748" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" fill="#a1a1aa">Recettes brutes</text>
  <text x="1065" y="250" font-family="system-ui, -apple-system, sans-serif" font-size="13" font-weight="700" fill="#10b981" text-anchor="end">1 380 € / 2 000 €</text>
  <rect x="748" y="259" width="324" height="8" rx="4" fill="#27272f"/>
  <rect x="748" y="259" width="224" height="8" rx="4" fill="#10b981"/>

  <!-- Alert -->
  <rect x="748" y="285" width="324" height="48" rx="10" fill="#f59e0b15"/>
  <rect x="748" y="285" width="324" height="48" rx="10" stroke="#f59e0b30" stroke-width="1"/>
  <text x="768" y="315" font-family="system-ui, -apple-system, sans-serif" font-size="12" font-weight="500" fill="#fbbf24">⚠️  Attention — Approche du seuil 30 tx</text>

  <!-- Stats -->
  <rect x="748" y="350" width="148" height="70" rx="10" fill="#0f0f13"/>
  <text x="763" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">Bénéfice net</text>
  <text x="763" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#10b981">+842 €</text>

  <rect x="912" y="350" width="148" height="70" rx="10" fill="#0f0f13"/>
  <text x="927" y="378" font-family="system-ui, -apple-system, sans-serif" font-size="11" fill="#6b7280">En stock</text>
  <text x="927" y="405" font-family="system-ui, -apple-system, sans-serif" font-size="20" font-weight="700" fill="#e4e4f7">7 articles</text>

  <!-- Bottom trust bar -->
  <rect x="0" y="580" width="1200" height="50" fill="#18181f"/>
  <text x="600" y="611" font-family="system-ui, -apple-system, sans-serif" font-size="16" fill="#6b7280" text-anchor="middle">✓ Gratuit pour commencer   ·   ✓ Données RGPD   ·   ✓ Hébergé en Europe</text>
</svg>
