services:
  postgres:
    image: postgres:15-alpine
    container_name: revendu_postgres
    environment:
      POSTGRES_USER: revendu
      POSTGRES_PASSWORD: revendu
      POSTGRES_DB: revendu
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U revendu"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: revendu_redis
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
